name: Scheduled
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Go Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run vulnerability check
        run: nix develop --command just vuln

  update-deps:
    name: Update dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Go Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Tidy and verify dependencies
        run: |
          nix develop --command go mod tidy
          nix develop --command go mod verify

      - name: Download dependencies
        run: nix develop --command go mod download

      - name: Open PR if go.mod/go.sum changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update dependencies"
          title: "chore: weekly dependency update"
          body: "Automated weekly update of Go dependencies."
          branch: "automation/dep-update"
          delete-branch: true

  update-flake:
    name: Update flake inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Open PR if inputs changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update flake inputs"
          title: "chore: weekly flake inputs update"
          body: "Automated weekly update of `flake.lock`."
          branch: "automation/flake-update"
          delete-branch: true
