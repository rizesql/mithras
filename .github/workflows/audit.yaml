name: Scheduled

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NIX_CONFIG: |
    experimental-features = nix-command flakes

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - run: nix develop --command govulncheck ./...
      - run: nix develop --command gosec ./...

  update-deps:
    name: Update Go dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Tidy
        run: nix develop --command go mod tidy

      - name: Validate after update
        run: nix flake check

      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          commit-message: "chore: update go dependencies"
          title: "chore: weekly Go dependency update"
          body: "Automated weekly update of Go dependencies."
          branch: "automation/dep-update"
          delete-branch: true

  update-flake:
    name: Update flake inputs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix

      - name: Update flake inputs
        run: nix flake update

      - name: Validate flake
        run: nix flake check

      - uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          commit-message: "chore: update flake inputs"
          title: "chore: weekly flake inputs update"
          body: "Automated weekly update of `flake.lock`."
          branch: "automation/flake-update"
          delete-branch: true
