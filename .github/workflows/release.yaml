name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o mithras-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/mithras

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mithras-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mithras-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: mithras-*
          merge-multiple: true
          path: ./bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./bin/*
          generate_release_notes: true
          fail_on_unmatched_files: true
