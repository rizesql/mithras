paths:
  post:
    tags: [auth]
    security: []
    operationId: forgotPassword

    summary: Forgot Password Request
    description: |
      Initiates the password reset flow. Sends a reset link to the provided
      email address if an account with that email exists.

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ForgotPasswordRequest"

    responses:
      "202":
        description: Request processed.
      "400":
        $ref: "../lib/errors.yaml#/BadRequestError"
      "429":
        $ref: "../lib/errors.yaml#/RateLimitError"
      "500":
        $ref: "../lib/errors.yaml#/InternalServerError"

components:
  schemas:
    ForgotPasswordRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          example: user@example.com
