paths:
  post:
    tags:
      - debug
    security: []
    operationId: echo
    summary: Echo
    description: |
      Reflects the provided message back to the caller unchanged.

      Use this endpoint to verify end-to-end request handling through the service — confirming that the network path, routing, and serialization layers are all functioning correctly. No authentication required and no side effects produced.

      **Required Permissions**

      None - this endpoint requires no authentication.

      **Side Effects**

      None - this is a read-only debug endpoint that does not modify any data or state.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/V1EchoRequest"

    responses:
      "200":
        description: Message echoed successfully.
        headers:
          X-Request-Id:
            $ref: "../lib/headers.yaml#/X-Request-Id"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/V1EchoResponse"

      "400":
        $ref: "../lib/errors.yaml#/BadRequestError"
      "429":
        $ref: "../lib/errors.yaml#/RateLimitError"
      "500":
        $ref: "../lib/errors.yaml#/InternalServerError"

components:
  schemas:
    V1EchoRequest:
      type: object
      required:
        - message
      properties:
        message:
          description: The message to echo back. The server will return this value unchanged in the response.
          example: Hello, Mithras!
          type: string
          minLength: 1
          maxLength: 1024
      additionalProperties: false
      description: Request body for the echo endpoint. The provided message will be reflected verbatim in the response data.

    V1EchoResponse:
      type: object
      required:
        - message
      properties:
        message:
          description: The echoed message, returned verbatim from the request. This
            value will always be identical to the message sent in the request body.
          example: Hello, Mithras!
          type: string
      additionalProperties: false
      description: Response data for the echo endpoint. Contains the original message
        reflected back unchanged from the request, confirming end-to-end request
        handling through the service.
