paths:
  post:
    tags: [auth]
    security: []
    operationId: resetPassword

    summary: Reset Password
    description: |
      Completes the password reset flow using a valid reset token.
      Changes the user's password to the new one provided.

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ResetPasswordRequest"

    responses:
      "200":
        description: Password reset successful.
        content:
          application/json:
            schema:
              type: object
      "400":
        $ref: "../lib/errors.yaml#/BadRequestError"
      "429":
        $ref: "../lib/errors.yaml#/RateLimitError"
      "500":
        $ref: "../lib/errors.yaml#/InternalServerError"

components:
  schemas:
    ResetPasswordRequest:
      type: object
      required: [token, password]
      additionalProperties: false
      properties:
        token:
          type: string
          description: The password reset token received via email.
          example: "rst_1234567890abcdef"
        password:
          type: string
          format: password
          description: The new password for the account.
          example: "new-secure-password-123"
