BadRequestError:
  description: Bad Request
  headers:
    X-Request-Id:
      $ref: "./headers.yaml#/X-Request-Id"
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: "#/Problem"
          - type: object
            required:
              - errors
            properties:
              errors:
                description: |
                  Field-level validation errors. Each entry identifies the
                  invalid field and explains the failure.

                  **Security note:** This array is only returned for structural
                  validation failures (malformed JSON, missing required fields,
                  type mismatches). It is never returned for authentication
                  failures — auth errors always use the base `problem` type
                  with a single generic message to prevent user enumeration.
                type: array
                minItems: 1
                items:
                  $ref: "#/FieldError"
            additionalProperties: false
      description: |
        RFC 7807 Problem Details for request validation failures (400 Bad Request).

        Extends the base problem type with a field-level `errors` array. Only used
        for structural/schema validation — never for authentication or authorization
        failures.
      example:
        type: https://api.mithras.com/problems/validation-failed
        title: Validation Failed
        status: 400
        detail: 2 field(s) failed validation.
        instance: /v1/echo
        request_id: req_d6q5bg6mmrj6s3linfvg
        errors:
          - path: body.message
            message: Must be at least 1 character.
            code: too_short
            hint: Provide a non-empty message string.

RateLimitError:
  description: Too Many Requests
  headers:
    X-Request-Id:
      $ref: "./headers.yaml#/X-Request-Id"
    Retry-After:
      description: |
        RFC3339 timestamp indicating when the rate limit window resets
        and the client may retry. Matches the `retry_after` field in
        the response body.
      schema:
        type: string
        format: date-time
        example: "2026-03-23T12:35:00Z"
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: "#/Problem"
          - type: object
            required:
              - retry_after
            properties:
              retry_after:
                description: |
                  RFC3339 timestamp indicating when the rate limit window resets
                  and the client may retry. Matches the `Retry-After` response
                  header value.
                type: string
                format: date-time
                example: "2026-03-23T12:35:00Z"
            additionalProperties: false
      description: |
        RFC 7807 Problem Details for rate limit errors (429 Too Many Requests).

        Extends the base problem type with a `retry_after` timestamp. The same
        value is present in the `Retry-After` response header for clients that
        prefer header-based handling.
      example:
        type: https://api.mithras.com/problems/rate-limit-exceeded
        title: Too Many Requests
        status: 429
        detail: Login rate limit exceeded. Try again after the retry_after timestamp.
        instance: /v1/auth/login
        request_id: req_d6q5bg6mmrj6s3linfvg
        retry_after: "2026-03-23T12:35:00Z"

UnauthorizedError:
  description: Unauthorized
  headers:
    X-Request-Id:
      $ref: "./headers.yaml#/X-Request-Id"
  content:
    application/problem+json:
      schema:
        $ref: "#/Problem"
      description: |
        RFC 7807 Problem Details for authentication failures (401 Unauthorized).
      example:
        type: https://api.mithras.com/problems/unauthorized
        title: Unauthorized
        status: 401
        detail: Invalid credentials.
        instance: /v1/auth/login
        request_id: req_d6q5bg6mmrj6s3linfvg

ForbiddenError:
  description: Forbidden
  headers:
    X-Request-Id:
      $ref: "./headers.yaml#/X-Request-Id"
  content:
    application/problem+json:
      schema:
        $ref: "#/Problem"
      description: |
        RFC 7807 Problem Details for authorization failures or locked accounts (403 Forbidden).
      example:
        type: https://api.mithras.com/problems/forbidden
        title: Forbidden
        status: 403
        detail: Access denied.
        instance: /v1/auth/login
        request_id: req_d6q5bg6mmrj6s3linfvg

InternalServerError:
  description: Internal Server Error
  headers:
    X-Request-Id:
      $ref: "./headers.yaml#/X-Request-Id"
  content:
    application/problem+json:
      schema:
        allOf:
          - $ref: "#/Problem"
          - type: object
            properties:
              code:
                description: Optional machine-readable error code for internal tracking
                type: string
            additionalProperties: false
      description: |
        RFC 7807 Problem Details for internal server errors (500 Internal Server Error).

        This extends the base Problem Details format with an optional "code" field
        for internal error tracking and correlation.
      example:
        type: https://api.mithras.com/problems/internal-error
        title: Internal Server Error
        status: 500
        detail: An unexpected error occurred
        instance: /v1/users/123
        request_id: req_d6q5bg6mmrj6s3linfvg
        code: unexpected_error

Problem:
  type: object
  required:
    - type
    - title
    - status
    - request_id
  properties:
    type:
      description: |
        URI reference identifying the problem type. Dereference for human-readable documentation.
      type: string
      format: uri
      example: https://api.mithras.com/problems/not-found
    title:
      description: |
        Short, human-readable summary of the problem type. Does not change between
        occurrences of the same problem type.
      type: string
      example: Not Found
    status:
      description: HTTP status code for this occurrence of the problem.
      type: integer
      example: 404
    detail:
      description: |
        Human-readable explanation specific to this occurrence. May vary between occurrences
        of the same problem type.
      type: string
      example: The requested resource was not found.
    instance:
      description: |
        URI reference identifying the specific occurrence. Typically the request path.
      type: string
      format: uri
      example: /v1/users/usr_abc123
    request_id:
      description: |
        Unique identifier for the request that produced this error. Matches the `X-Request-Id`
        response header. Include this value when reporting issues or investigating security events.
      type: string
      example: req_d6q5bg6mmrj6s3linfvg
  additionalProperties: true
  description: |
    RFC 7807 Problem Details for HTTP APIs.

    Provides machine-readable error details in HTTP responses. The `request_id`
    field is an extension to the base RFC 7807 format — it is always present
    and matches the `X-Request-Id` response header, making the error body
    fully self-contained for debugging without requiring access to response
    headers.

    See https://tools.ietf.org/html/rfc7807.
  example:
    type: https://api.mithras.com/problems/not-found
    title: Not Found
    status: 404
    detail: The requested resource was not found.
    instance: /v1/users/usr_abc123
    request_id: req_d6q5bg6mmrj6s3linfvg

FieldError:
  type: object
  required:
    - path
    - message
  properties:
    path:
      description: |
        JSON path to the invalid field, prefixed with its location.
        Examples: `body.email`, `query.page`, `header.authorization`.
      type: string
      example: body.email
    message:
      description: Human-readable explanation of the validation failure.
      type: string
      example: Must be a valid email address.
    code:
      description: Machine-readable code for this validation failure.
      type: string
      example: invalid_format
    hint:
      description: Suggested fix or expected value format.
      type: string
      example: "Enter user@example.com"
    invalid_value:
      description: The invalid value that was provided, if safe to echo back.
      type: string
  additionalProperties: false
  description: |
    A single field-level validation error.

    Extension to RFC 7807 Problem Details providing granular information about
    which field failed validation and why. Only used in `validation_error_response`
    bodies — never in authentication or authorization error responses.
  example:
    path: body.email
    message: Must be a valid email address.
    code: invalid_format
    hint: "Enter user@example.com"
