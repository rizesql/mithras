version: "2"

run:
  timeout: 5m
  tests: true

output:
  sort-results: true

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - errorlint
    - ineffassign
    - unused
    - nilerr
    - nilnil
    - noctx
    - contextcheck

    - revive
    - cyclop
    - funlen
    - nestif
    - dupl

    - prealloc
    - makezero
    - unconvert

    - misspell
    - whitespace
    - lll
    - goconst

    - copyloopvar
    - forcetypeassert
    - exhaustive

  settings:
    govet:
      enable-all: false

    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: indent-error-flow
        - name: early-return
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

    funlen:
      lines: 70
      statements: 40

    lll:
      line-length: 100

    nestif:
      min-complexity: 4

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    gofmt:
      simplify: true

    goimports:
      local-prefixes: github.com/aegis-run/aegis

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
        - (*github.com/fatih/color.Color).Fprint
        - (*github.com/fatih/color.Color).Fprintf
        - (*github.com/fatih/color.Color).Fprintln

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    wrapcheck:
      ignoreSigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - cyclop
          - dupl

      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/rizesql/mithras
